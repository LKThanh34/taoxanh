<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Website taoxanh.vn" />
    <meta name="author" content="Le Kim Thanh" />
    <title>taoxanh</title>
    <link th:href="@{/admin/css/styles.css}" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>

<body class="sb-nav-fixed">
    <th:block th:replace="admin/layout/header :: header"></th:block>
    <div id="layoutSidenav">
        <th:block th:replace="admin/layout/sidebar :: sidebar"></th:block>
        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid px-4">
                    <div class="row justify-content-center">

                        <div th:each="category : ${categoryList}" class="col-xl-2 col-md-3 col-sm-6">
                            <div class="card bg-light text-dark mb-4">
                                <div class="card-body">
                                    <img class="img-fluid"
                                        th:src="@{/admin/images/{image}(image=${category.categoryImage})}" alt="" />
                                </div>
                                <div class="card-footer d-flex align-items-center justify-content-between">
                                    <a class="text-dark stretched-link" href="login.html"
                                        th:text="${category.categoryName}"></a>
                                    <div class="small text-dark"><i class="fas fa-angle-right"></i></div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="row">
                        <div class="col-xl-6">
                            <div class="card mb-4">
                                <div class="card-header">
                                    <i class="fas fa-chart-area me-1"></i>
                                    Area Chart Example
                                </div>
                                <div class="card-body"><canvas id="myAreaChart" width="100%" height="40"></canvas></div>
                            </div>
                        </div>
                        <div class="col-xl-6">
                            <div class="card mb-4">
                                <div class="card-header">
                                    <i class="fas fa-chart-bar me-1"></i>
                                    Bar Chart Example
                                </div>
                                <div class="card-body"><canvas id="myBarChart" width="100%" height="40"></canvas></div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-5">
                        <div class="row">
                            <div class="col-12 mx-auto">

                                <hr />
                                <table class="table table-bordered table-hover">
                                    <thead>
                                        <tr>
                                            <th>Mã Đơn Hàng</th>
                                            <th>Ngày Đặt</th>
                                            <th>Ngày Nhận</th>
                                            <th>Sản Phẩm</th>
                                            <th>SL</th>
                                            <th>Trạng Thái</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                    </div>
                </div>
            </main>
            <th:block th:replace="admin/layout/footer :: footer"></th:block>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script th:src="@{/admin/js/scripts.js}"></script>

</body>

</html>
